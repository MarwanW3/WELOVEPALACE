<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELOVEPALACE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="games.css">

</head>
<body>
<header>
    <h1><a href="/">WELOVEPALACE</a></h1>
</header>

<aside>
    <a href="upcoming_games">Upcoming Games</a>
    <a href="finished_games">Played games</a>
</aside>

<div class="search-container">
    <input type="text" id="teamSearch" placeholder="search for upcoming games..." onkeyup="filterTeams()">
</div>
<main>

    <!-- Upcoming games -->
    <ul class="list bg-base-100 rounded-box shadow-md">
        <li class="list-row-header"><h4>Upcoming games</h4></li>

        <li class="list-row" th:each="match, iterStat : ${upcomingMatches}">
            <div class="match-info">
                <div class="team home-team">
                    <p th:text="${match.homeTeam}">Hemmalag</p>
                </div>

                <div class="vs-container">
                    <p class="vs-text">VS</p>
                    <p th:text="${#temporals.format(match.utcDate, 'dd MMM HH:mm')}" class="date-text"></p>
                </div>

                <div class="team away-team">
                    <p th:text="${match.awayTeam}">Bortalag</p>
                </div>
            </div>

            <div class="prediction-section">
                <button class="predict-btn" th:attr="data-index=${iterStat.index}">
                    Predict Score
                </button>
                <p class="prediction" th:attr="id='prediction-' + ${iterStat.index}"></p>
                <p class="prediction-explanation" th:attr="id='prediction-explanation-' + ${iterStat.index}"></p>
            </div>
        </li>
    </ul>
</main>


<script>
    document.addEventListener("DOMContentLoaded", function() {
        const buttons = document.querySelectorAll(".predict-btn");

        buttons.forEach(button => {
            button.addEventListener("click", function() {
                if (this.disabled) return;

                this.disabled = true;
                this.innerText = "Loading...";

                const index = this.getAttribute("data-index");
                const predictionElem = document.getElementById("prediction-" + index);
                const explanationElem = document.getElementById("prediction-explanation-" + index);

                predictionElem.innerHTML = "";
                explanationElem.innerHTML = "";

                fetch(`/api/predict?matchIndex=${index}`)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error("HTTP error " + response.status);
                        }
                        return response.json();
                    })
                    .then(data => {
                        console.log("Prediction response:", data);

                        predictionElem.innerHTML = `${data.homeScore} - ${data.awayScore}`;
                        predictionElem.classList.add("show");

                        if (data.explanation) {
                            explanationElem.innerHTML = data.explanation;
                            explanationElem.classList.add("show");
                        }

                        this.innerText = "Predicted";
                    })
                    .catch(err => {
                        predictionElem.innerHTML = "Prediction not available";
                        explanationElem.innerHTML = "";
                        this.disabled = false;
                        this.innerText = "Predict Score";
                        console.error("Prediction error:", err);
                    });
            });
        });
    });
    function filterTeams() {
        let input = document.getElementById('teamSearch');
        let filter = input.value.toLowerCase();
        let rows = document.querySelectorAll('.list-row');

        rows.forEach(row => {
            let rowText = row.innerText.toLowerCase();
            if (rowText.includes(filter)) {
                row.style.display = "flex";
            } else {
                row.style.display = "none";
            }
        });
    }
</script>
</body>
</html>
