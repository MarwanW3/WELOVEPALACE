<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELOVEPALACE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="games.css">

</head>
<body>
<header>
    <h1><a href="/">WELOVEPALACE</a></h1>
</header>

<aside>
    <a href="upcoming_games">Upcoming Games</a>
    <a href="finished_games">Played games</a>
</aside>


<main>
    <div class="search-container">
        <input type="text" id="teamSearch" placeholder="Search for upcoming games..." onkeyup="filterTeams()">
    </div>

    <!-- Upcoming games -->
    <ul class="list bg-base-100 rounded-box shadow-md">
        <li class="list-row-header"><h4>Upcoming games</h4></li>

        <li class="list-row" th:each="match, iterStat : ${upcomingMatches}">
            <div class="match-info">
                <div class="team home-team">
                    <p th:text="${match.homeTeam}">Hemmalag</p>
                </div>

                <div class="vs-container">
                    <p class="vs-text">VS</p>
                    <p th:text="${#temporals.format(match.utcDate, 'dd MMM HH:mm')}" class="date-text"></p>
                </div>

                <div class="team away-team">
                    <p th:text="${match.awayTeam}">Bortalag</p>
                </div>
            </div>

            <div class="prediction-section">
                <div th:if="${match.predictedHomeScore != null}" class="server-mashup">
                    <p class="prediction show" th:text="${match.predictedHomeScore + ' - ' + match.predictedAwayScore}"></p>
                    <p class="prediction-explanation show">Loading prediction.</p>
                </div>

                <div th:if="${match.predictedHomeScore == null}">
                    <button class="predict-btn" th:attr="data-index=${iterStat.index}">
                        Predict Score
                    </button>
                    <p class="prediction" th:attr="id='prediction-' + ${iterStat.index}"></p>
                    <p class="prediction-explanation" th:attr="id='prediction-explanation-' + ${iterStat.index}"></p>
                </div>
            </div>
        </li>
    </ul>
</main>


<script>
    document.addEventListener("DOMContentLoaded", function () {
        const rows = document.querySelectorAll(".list-row:not(.list-row-header)");

        rows.forEach((row, index) => {
            if (index >= 5) return;

            const section = row.querySelector(".prediction-section");
            if (section) {
                section.innerHTML = `
                <p class="prediction-explanation show">
                    Loading AI predictions...
                </p>
            `;
            }
        });


        fetch("/api/matches/top5")
            .then(res => res.json())
            .then(matches => {

                matches.forEach((match, index) => {

                    const container = rows[index];
                    if (!container) return;

                    const box = document.createElement("div");
                    box.className = "server-mashup";

                    box.innerHTML = `
                    <p class="prediction show">
                        ${match.predictedHomeScore} - ${match.predictedAwayScore}
                    </p>
                    <p class="prediction-explanation show">
                        ${match.explanation}
                    </p>
                `;

                    container.querySelector(".prediction-section").innerHTML = "";
                    container.querySelector(".prediction-section").appendChild(box);
                });

            });


        const buttons = document.querySelectorAll(".predict-btn");

        buttons.forEach(button => {
            button.addEventListener("click", function () {

                this.disabled = true;
                this.innerText = "Loading AI Prediction...";

                const index = this.getAttribute("data-index");

                const predictionElem = document.getElementById("prediction-" + index);
                const explanationElem = document.getElementById("prediction-explanation-" + index);

                fetch(`/api/predict?matchIndex=${index}`)
                    .then(res => res.json())
                    .then(data => {

                        predictionElem.innerHTML = `${data.homeScore} - ${data.awayScore}`;
                        explanationElem.innerHTML = data.explanation;

                    })
                    .catch(err => console.error(err))
                    .finally(() => {
                        this.innerText = "Predict Score";
                        this.disabled = false;
                });

            });
        });

    });
</script>
</body>
</html>
